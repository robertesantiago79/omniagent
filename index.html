t="ghost" onClick={props.onClose}>Cancel</Btn>\n      </div>\n    </OAModal>\n  );\n}\n\n/* ── NATURAL LANGUAGE INPUT ── */\nfunction NLInput(props) {\n  var [text, setText] = useState("");\n  var [loading, setLoading] = useState(false);\n  var [error, setError] = useState("");\n  async function parse() {\n    if(!text.trim()) return;\n    setLoading(true); setError("");\n    try {\n      var resp = await fetch("https://api.anthropic.com/v1/messages", {\n        method:"POST",\n        headers:{"Content-Type":"application/json"},\n        body:JSON.stringify({\n          model:"claude-sonnet-4-20250514",\n          max_tokens:300,\n          messages:[{role:"user",content:"Parse this into a task. Return ONLY JSON with keys: title, priority (critical/high/medium/low), dueDate (YYYY-MM-DD or null), projectHint (string or null), dueTime (HH:MM 24h or null). Input: "+text}]\n        })\n      });\n      var data = await resp.json();\n      var raw = (data.content||[]).map(function(c){return c.text||"";}).join("");\n      var clean = raw.replace(/```json|```/g,"").trim();\n      var parsed = JSON.parse(clean);\n      props.onAddTask({\n        title: parsed.title || text,\n        priority: parsed.priority || "medium",\n        dueDate: parsed.dueDate || null,\n        dueTime: parsed.dueTime || null,\n        projectHint: parsed.projectHint || null,\n        reminderAt: parsed.dueDate ? buildReminderISO(parsed.dueDate, parsed.dueTime||"09:00", 30) : null,\n        reminderDismissed: false,\n        desc: "",\n      });\n      setText("");\n      props.onToast("Task created from natural language ✅");\n    } catch(e) {\n      setError("Couldn\'t parse — creating as plain task");\n      props.onAddTask({title:text,priority:"medium",dueDate:null,dueTime:null,reminderAt:null,reminderDismissed:false,desc:""});\n      setText("");\n    }\n    setLoading(false);\n  }\n  return (\n    <div style={{background:"linear-gradient(135deg,rgba(99,102,241,0.07),rgba(99,102,241,0.03))",b host" onClick={function(){props.onComplete(task.id);props.onClose();}}>Complete</Btn>}\n        </div>\n        {task.createdAt&&<div style={{marginTop:14,fontSize:11,color:T2.tert}}>{"Created "+fmtDate(task.createdAt)}</div>}\n      </div>}\n    </OASheet>\n  );\n}\n\n/* ── CONVERT SHEET ── */\nfunction ConvertSheet(props) {\n  var note=props.note;\n  var [title,setTitle]=useState(""); var [desc,setDesc]=useState(""); var [prio,setPrio]=useState("medium"); var [due,setDue]=useState(""); var [projId,setProjId]=useState("");\n  useEffect(function(){if(note){setTitle(note.title||"Untitled");setDesc(note.body.slice(0,400));setProjId(note.linkedProjectId||"");setPrio("medium");setDue("");}}, [note]);\n  function confirm(){props.onConfirm({title:title,desc:desc,priority:prio,dueDate:due||null,projectId:projId||null,sourceNoteId:note.id});props.onClose();}\n  var pOpts=[{v:"",l:"No project"}].concat(props.projects.map(function(p){return {v:p.id,l:p.title};}));\n  var prOpts=["critical","high","medium","low"].map(function(v){return {v:v,l:PL[v]};});\n  return (\n    <OASheet open={props.open} onClose={props.onClose} bg="var(--oa-card)" border="var(--oa-border)">\n      {note&&<div style={{padding:26}}>\n        <div style={{fontSize:18,fontWeight:800,color:"var(--oa-text)",marginBottom:14,display:"flex",alignItems:"center",gap:8}}><ArrowRight size={18} color="#c2410c"/>Convert to Task</div>\n        <div style={{background:"var(--oa-card)",border:"1px solid var(--oa-border)",borderRadius:9,padding:"10px 13px",marginBottom:18}}><div style={{fontSize:10,color:"var(--oa-tert)",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:3}}>Source Note</div><div style={{fontSize:13,color:"var(--oa-sec)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{note.title||"Untitled"}</div></div>\n        <div style={{marginBottom:12}}><FL>Task Title</FL><GlassInput value={title} onChange={setTitle} placeholder="Task title..." border="#ede9e0" color="#1c1917"/></div>\n        <div style={{marginBottom:12}}><FL>Description</FL><GlassInput value={desc} onChange={setDesc} placeholder="Description..." border="#ede9e0" color="#1c1917" multi rows={4}/></div>\n        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}><div><FL>Priority</FL><GlassSel value={prio} onChange={setPrio} opts={prOpts} border="#ede9e0" color="#1c1917"/></div><div><FL>Due Date</FL><input type="date" value={due} onChange={function(e){setDue(e.target.value);}} style={{background:"rgba(0,0,0,0.04)",border:"1px solid var(--oa-border)",borderRadius:10,padding:"10px 13px",color:"var(--oa-text)",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"}}/></div></div>\n        <div style={{marginBottom:22}}><FL>Project</FL><GlassSel value={projId} onChange={setProjId} opts={pOpts} border="#ede9e0" color="#1c1917"/></div>\n        <div style={{display:"flex",gap:8}}><Btn onClick={confirm} style={{flex:1,background:"#6366f1"}}>Create Task →</Btn><Btn variant="ghost" onClick={props.onClose}>Cancel</Btn></div>\n      </div>}\n    </OASheet>\n  );\n}\n\n/* ── QUICK ADD ── */\nfunction QuickAdd(props) {\n  var defaultTab=props.mode==="capture"?"note":props.mode==="focus"?"task":"project";\n  var T2=TH[props.mode]||TH.capture;\n  var isDark=props.mode==="plan"||props.mode==="cal";\n  var bg=isDark?"#0d1929":props.mode==="focus"?"#f3f4ff":"#faf9f4";\n  var brd=isDark?"#162336":props.mode==="focus"?"#ddd6fe":"#ede9e0";\n  var tc=isDark?"#dde8f5":props.mode==="focus"?"#1e1b4b":"#1c1917";\n  var [tab,setTab]=useState(defaultTab); var [title,setTitle]=useState(""); var [body,setBody]=useState(""); var [prio,setPrio]=useState("medium"); var [due,setDue]=useState(""); var [dueTime,setDueTime]=useState(""); var [projId,setProjId]=useState(""); var [projTitle,setProjTitle]=useState("");\n  useEffect(function(){if(props.open){setTab(defaultTab);setTitle("");setBody("");setPrio("medium");setDue("");setDueTime("");setProjId("");setProjTitle("");}}, [props.open]);\n  function submit(){\n    if(tab==="note"){if(!body.trim()&&!title.trim())return;props.onAddNote(title||"Untitled",body,null);}\n    else if(tab==="task"){\n      if(!title.trim())return;\n      var autoReminder = due ? buildReminderISO(due, dueTime||"09:00", 30) : null;\n      props.onAddTask({title:title,desc:body,priority:prio,dueDate:due||null,dueTime:dueTime||null,reminderAt:autoReminder,reminderDismissed:false,projectId:projId||null});\n    }\n    else{props.onAddProject(projTitle||"New Project");}\n    props.onClose();\n  }\n  var pOpts=[{v:"",l:"No project"}].concat(props.projects.map(function(p){return {v:p.id,l:p.title};}));\n  var prOpts=["critical","high","medium","low"].map(function(v){return {v:v,l:PL[v]};});\n  var tabs=[["note","📝 Note"],["task","✅ Task"],["project","📁 Project"]];\n  var inputStyle={background:"rgba(0,0,0,0.04)",border:"1px solid "+brd,borderRadius:10,padding:"10px 13px",color:tc,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",colorScheme:isDark?"dark":"light",fontFamily:"inherit"};\n  return (\n    <OAModal open={props.open} onClose={props.onClose} bg={bg} border={brd} w={460}>\n      <div style={{padding:22}}>\n        <div style={{display:"flex",gap:5,marginBottom:18}}>{tabs.map(function(t2){return <button key={t2[0]} onClick={function(){setTab(t2[0]);}} style={{background:tab===t2[0]?T2.accentBg:"transparent",border:"1px solid "+(tab===t2[0]?T2.accent:brd),color:tab===t2[0]?T2.accent:T2.sec,borderRadius:9,padding:"7px 0",fontSize:12,cursor:"pointer",flex:1,fontWeight:tab===t2[0]?700:400,fontFamily:"inherit",transition:"all 0.15s"}}>{t2[1]}</button>;})}\n        </div>\n        {tab==="project"?<div style={{marginBottom:18}}><FL color={T2.sec}>Project Name</FL><GlassInput value={projTitle} onChange={setProjTitle} placeholder="Project name..." border={brd} color={tc}/></div>\n        :tab==="note"?<div>\n          <div style={{marginBottom:12}}><FL color={T2.sec}>What\'s on your mind?</FL><GlassInput value={body} onChange={setBody} placeholder="Type or paste anything..." border={brd} color={tc} multi rows={4}/></div>\n          <div style={{marginBottom:18}}><FL color={T2.sec}>Title (optional)</FL><GlassInput value={title} onChange={setTitle} placeholder="Leave blank to save as Untitled" border={brd} color={tc}/></div>\n        </div>\n        :<div>\n          <div style={{marginBottom:12}}><FL color={T2.sec}>Task Title</FL><GlassInput value={title} onChange={setTitle} placeholder="What needs to be done?" border={brd} color={tc}/></div>\n          <div style={{marginBottom:12}}><FL color={T2.sec}>Details (optional)</FL><GlassInput value={body} onChange={setBody} placeholder="Add more..." border={brd} color={tc} multi rows={2}/></div>\n          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>\n            <div><FL color={T2.sec}>Priority</FL><GlassSel value={prio} onChange={setPrio} opts={prOpts} border={brd} color={tc}/></div>\n            <div><FL color={T2.sec}>Due Date</FL><input type="date" value={due} onChange={function(e){setDue(e.target.value);}} style={inputStyle}/></div>\n          </div>\n          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>\n            <div><FL color={T2.sec}>Time of Day</FL><input type="time" value={dueTime} onChange={function(e){setDueTime(e.target.value);}} style={inputStyle}/></div>\n            <div><FL color={T2.sec}>Project (optional)</FL><GlassSel value={projId} onChange={setProjId} opts={pOpts} border={brd} color={tc}/></div>\n          </div>\n          {due&&<div style={{fontSize:11,color:"#818cf8",marginBottom:12,display:"flex",alignItems:"center",gap:5}}>🔔 Reminder auto-set 30 min before {dueTime?fmtTime(dueTime):"9:00 AM"}</div>}\n        </div>}\n        <div style={{display:"flex",gap:8}}><Btn onClick={submit} style={{flex:1,background:T2.accent}}>{tab==="note"?"Save Note":tab==="task"?"Create Task":"Create Project"}</Btn><Btn variant="ghost" onClick={props.onClose}>Cancel</Btn></div>\n      </div>\n    </OAModal>\n  );\n}\n\n/* ── CSV IMPORT ── */\nfunction ImportModal(props) {\n  var [step, setStep] = useState("paste");\n  var [importType, setImportType] = useState("csv"); // csv | xml | text\n  var [raw, setRaw] = useState("");\n  var [rows, setRows] = useState([]);\n  var [headers, setHeaders] = useState([]);\n  var [mapping, setMapping] = useState({});\n  var [preview, setPreview] = useState([]);\n  var [importedCount, setImportedCount] = useState(0);\n\n  var ALIASES = {\n    title:   [\n      // Generic\n      "task name","name","title","subject","task","summary","work item",\n      // Jira\n      "issue","summary","issue summary","story","epic name","issue key",\n      // Asana\n      "task name","name",\n      // Trello\n      "card name","card title",\n      // MS Planner\n      "task title","bucket name",\n      // Monday\n      "item","item name",\n    ],\n    desc:    ["description","notes","details","body","comment","note","acceptance criteria","story description","card description"],\n    dueDate: [\n      // Generic\n      "finish","due date","end date","deadline","due","target date","end","finish date",\n      // MS Project specific\n      "finish date","baseline finish","actual finish","scheduled finish",\n      // Jira\n      "due date","duedate",\n      // Asana\n      "due date","due on",\n    ],\n    startDate:["start","start date","begin date","planned start","baseline start","scheduled start","actual start"],\n    priority:["priority","importance","urgency","rank","severity","story points","sp","points","issue priority"],\n    status:  [\n      "status","state","stage","complete","% complete","percent complete",\n      // Jira\n      "issue status","resolution","done","assignee status",\n      // MS Project\n      "% work complete","actual work",\n      // Asana\n      "completed","section",\n    ],\n    project: ["project","project name","epic","workstream","category","bucket","group","sprint","iteration","milestone","component","label"],\n  };\n\n  /* ── MS PROJECT XML PARSER ── */\n  function parseXML(text) {\n    try {\n      var parser = new DOMParser();\n      var doc = parser.parseFromString(text, "text/xml");\n      var tasks = [];\n      // MS Project XML format: <Tasks><Task>...</Task></Tasks>\n      var taskNodes = doc.querySelectorAll("Task");\n      if(!taskNodes.length) {\n        // Try generic XML: any element with Name or Title child\n        taskNodes = doc.querySelectorAll("task, Task, TASK, item, Item, row, Row");\n      }\n      taskNodes.forEach(function(node) {\n        function getVal(tag) {\n          var el = node.querySelector(tag);\n          return el ? el.textContent.trim() : "";\n        }\n        var name = getVal("Name") || getVal("Title") || getVal("Subject") || getVal("TaskName");\n        if(!name || name === "0") return; // MS Project has a row 0 which is the project summary\n        var outlineLevel = parseInt(getVal("OutlineLevel") || "1");\n        if(outlineLevel > 3) return; // skip deeply nested sub-tasks for now\n        var finish = getVal("Finish") || getVal("Deadline") || getVal("FinishDate") || getVal("DueDate");\n        var pct = getVal("PercentComplete") || getVal("PercentWorkComplete") || "0";\n        var priority = getVal("Priority") || "500"; // MS Project uses 0-1000 scale, 500=normal\n        var notes = getVal("Notes") || getVal("Description") || "";\n        // Normalize MS Project priority (0-1000) to our scale\n        var normP = "medium";\n        var p = parseInt(priority);\n        if(p >= 900) normP = "critical";\n        else if(p >= 700) normP = "high";\n        else if(p <= 200) normP = "low";\n        // Normalize status from percent complete\n        var normS = "inbox";\n        var pctNum = parseInt(pct);\n        if(pctNum >= 100) normS = "done";\n        else if(pctNum > 0) normS = "in_progress";\n        tasks.push({\n          title: name.slice(0, 120),\n          desc: notes.slice(0, 400),\n          dueDate: normDate(finish),\n          priority: normP,\n          status: normS,\n          project: getVal("WBS") || getVal("ProjectName") || "",\n        });\n      });\n      return tasks;\n    } catch(e) {\n      return [];\n    }\n  }\n\n  /* ── SMART TEXT / MARKDOWN PARSER ── */\n  function parseSmartText(text) {\n    var lines = text.split("\\n").filter(function(l) { return l.trim(); });\n    return lines.map(function(line) {\n      var title = line;\n      var dueDate = null;\n      var priority = "medium";\n      var status = "inbox";\n\n      // Strip markdown checkbox: - [ ] or - [x] or * [ ] or * [x]\n      var cbDone = /^[\\-\\*]\\s+\\[x\\]\\s+/i.test(title);\n      title = title.replace(/^[\\-\\*]\\s+\\[[ xX]\\]\\s+/, "");\n      if(cbDone) status = "done";\n\n      // Strip numbered list: 1. or 1)\n      title = title.replace(/^\\d+[\\.\\)]\\s+/, "");\n\n      // Strip plain bullet: - or * or •\n      title = title.replace(/^[\\-\\*•]\\s+/, "");\n\n      // Detect pipe-separated: Task | Due | Priority | Status\n      if(title.indexOf("|") >= 0) {\n        var parts = title.split("|").map(function(p) { return p.trim(); });\n        title = parts[0] || title;\n        if(parts[1]) dueDate = normDate(parts[1]);\n        if(parts[2]) priority = normPriority(parts[2]);\n        if(parts[3]) status = normStatus(parts[3]);\n      }\n\n      // Detect inline date: "Task name (due 2026-05-01)" or "Task name by Apr 20"\n      var dateMatch = title.match(/\\((?:due|by|on)?\\s*(\\d{4}-\\d{2}-\\d{2})\\)/i) ||\n                      title.match(/\\bby\\s+(\\w+ \\d+)\\b/i) ||\n                      title.match(/\\((\\d{1,2}\\/\\d{1,2}(?:\\/\\d{2,4})?)\\)/);\n      if(dateMatch && !dueDate) {\n        dueDate = normDate(dateMatch[1]);\n        title = title.replace(dateMatch[0], "").trim();\n      }\n\n      // Detect inline priority: "!!" or "!!!" or "[high]" or "#critical"\n      if(/!!!|#critical|\\[critical\\]/i.test(title)) { priority = "critical"; title = title.replace(/!!!|#critical|\\[critical\\]/gi,"").trim(); }\n      else if(/!!|#high|\\[high\\]/i.test(title)) { priority = "high"; title = title.replace(/!!|#high|\\[high\\]/gi,"").trim(); }\n      else if(/#low|\\[low\\]/i.test(title)) { priority = "low"; title = title.replace(/#low|\\[low\\]/gi,"").trim(); }\n\n      return { title: title.trim().slice(0, 120), desc: "", dueDate: dueDate, priority: priority, status: status, project: "" };\n    }).filter(function(r) { return r.title && r.title.length > 1; });\n  }\n\n  /* ── UNIFIED PARSE HANDLER ── */\n  function handleParse() {\n    if(!raw.trim()) return;\n    if(importType === "xml") {\n      var xmlTasks = parseXML(raw);\n      if(!xmlTasks.length) { alert("No tasks found in XML. Make sure you exported MS Project XML format (File → Save As → XML)."); return; }\n      setPreview(xmlTasks);\n      setStep("preview");\n      return;\n    }\n    if(importType === "text") {\n      var textTasks = parseSmartText(raw);\n      if(!textTasks.length) { return; }\n      setPreview(textTasks);\n      setStep("preview");\n      return;\n    }\n    // CSV\n    var parsed = parseCSV(raw);\n    if(!parsed.headers.length) return;\n    setHeaders(parsed.headers);\n    setRows(parsed.rows);\n    var mp = autoMap(parsed.headers);\n    setMapping(mp);\n    setPreview(buildPreview(parsed.rows, mp));\n    setStep(importType === "csv" ? "map" : "preview");\n  }\n\n  function detectDelim(text) {\n    var row0 = text.split("\\n")[0] || "";\n    var tabs = row0.split("\\t").length;\n    var commas = row0.split(",").length;\n    var semis = row0.split(";").length;\n    if(tabs > commas && tabs > semis) return "\\t";\n    if(semis > commas) return ";";\n    return ",";\n  }\n\n  function splitLine(line, delim) {\n    var result = []; var cur = ""; var inQ = false;\n    for(var i = 0; i < line.length; i++) {\n      var c = line[i];\n      if(c === \'"\') { inQ = !inQ; continue; }\n      if(c === delim && !inQ) { result.push(cur.trim()); cur = ""; continue; }\n      cur += c;\n    }\n    result.push(cur.trim());\n    return result;\n  }\n\n  function parseCSV(text) {\n    var delim = detectDelim(text);\n    var lines = text.trim().split("\\n").filter(function(l) { return l.trim(); });\n    if(lines.length < 2) return { headers: [], rows: [] };\n    var hdrs = splitLine(lines[0], delim).map(function(h) { return h.replace(/^"|"$/g, "").trim(); });\n    var rws = lines.slice(1).map(function(l) {\n      var vals = splitLine(l, delim);\n      var obj = {};\n      hdrs.forEach(function(h, i) { obj[h] = (vals[i] || "").replace(/^"|"$/g, "").trim(); });\n      return obj;\n    }).filter(function(r) {\n      var vals = Object.keys(r).map(function(k) { return r[k]; });\n      return vals.some(function(v) { return v; });\n    });\n    return { headers: hdrs, rows: rws };\n  }\n\n  function autoMap(hdrs) {\n    var m = {};\n    hdrs.forEach(function(h) {\n      var hl = h.toLowerCase().trim();\n      Object.keys(ALIASES).forEach(function(field) {\n        if(!m[field]) {\n          ALIASES[field].forEach(function(alias) {\n            if(!m[field] && (hl === alias || hl.indexOf(alias) === 0)) { m[field] = h; }\n          });\n        }\n      });\n    });\n    return m;\n  }\n\n  function normPriority(v) {\n    if(!v) return "medium";\n    var vl = v.toLowerCase();\n    if(vl.indexOf("crit") >= 0 || vl === "1" || vl === "urgent") return "critical";\n    if(vl.indexOf("high") >= 0 || vl === "2") return "high";\n    if(vl.indexOf("low") >= 0 || vl === "4" || vl === "5") return "low";\n    return "medium";\n  }\n\n  function normDate(v) {\n    if(!v) return null;\n    var clean = v.trim().split(" ")[0];\n    if(/^\\d{4}-\\d{2}-\\d{2}/.test(clean)) return clean.slice(0, 10);\n    var parts = clean.split(/[\\/\\-\\.]/);\n    if(parts.length === 3) {\n      if(parseInt(parts[0]) > 31) return parts[0] + "-" + parts[1].padStart(2,"0") + "-" + parts[2].p ,marginTop:2}}>{p.sub}</div>}</div><div style={{flexShrink:0}}>{p.children}</div></div>;}\n  function Toggle(p){var on=s[p.k];return <div onClick={function(){upd(p.k,!on);}} style={{width:48,height:26,borderRadius:13,background:on?s.accentColor:"#d1d5db",cursor:"pointer",position:"relative",transition:"background 0.25s",flexShrink:0,boxShadow:on?"0 0 8px "+s.accentColor+"55":"none"}}><div style={{position:"absolute",top:3,left:on?25:3,width:20,height:20,borderRadius:"50%",background:"var(--oa-card)",boxShadow:"0 1px 4px rgba(0,0,0,0.25)",transition:"left 0.25s"}}/></div>;}\n  function Sec(p){return <div style={{fontSize:9,fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",color:s.accentColor,marginBottom:8,marginTop:20}}>{p.children}</div>;}\n  function SegBtn(p){return <div style={{display:"flex",gap:3,background:isDarkTheme?"rgba(255,255,255,0.06)":"#f3f4f6",borderRadius:10,padding:3}}>{p.opts.map(function(o){var active=p.val===o.v;return <button key={o.v} onClick={function(){upd(p.k,o.v);}} style={{flex:1,padding:"7px 6px",background:active?s.accentColor:"transparent",color:active?"#fff":sec,border:"none",borderRadius:8,fontSize:11,fontWeight:active?700:500,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s",whiteSpace:"nowrap"}}>{o.l}</button>;})}</div>;}\n\n  var activeTab = TABS.find(function(t){return t.k===tab;}) || TABS[0];\n\n  return (\n    <OASheet open={props.open} onClose={props.onClose} bg={bg} border={brd} w={540} noScroll={true}>\n      <div style={{display:"flex",height:"100%",position:"absolute",inset:0}}>\n\n        {/* Sidebar */}\n        <div style={{width:150,background:isDarkTheme?"rgba(0,0,0,0.4)":"#f3f4f6",borderRight:"1px solid "+brd,flexShrink:0,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>\n          <div style={{padding:"18px 14px 10px",display:"flex",alignItems:"center",gap:8}}>\n            <div style={{width:26,height:26,borderRadius:7,background:s.accentColor,display:"flex",alignItems:"center",justifyCon out the app.</div>\n              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:4}}>\n                {[\n                  {v:"sharp",   l:"Sharp",   r:4,  desc:"Flat & minimal"},\n                  {v:"default", l:"Default", r:12, desc:"Balanced"},\n                  {v:"rounded", l:"Rounded", r:18, desc:"Soft & modern"},\n                  {v:"pill",    l:"Pill",    r:28, desc:"Bubble style"},\n                ].map(function(o){\n                  var active=s.cornerRadius===o.v;\n                  return <button key={o.v} onClick={function(){upd("cornerRadius",o.v);}} style={{background:active?s.accentColor+"18":cardBg,border:"2px solid "+(active?s.accentColor:brd),borderRadius:10,padding:"12px 10px",cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s",textAlign:"center"}}>\n                    <div style={{display:"flex",justifyContent:"center",marginBottom:8}}>\n                      <div style={{width:44,height:28,background:active?s.accentColor+"30":isDarkTheme?"rgba(255,255,255,0.1)":"#e2e8f0",borderRadius:o.r+"px",border:"2px solid "+(active?s.accentColor:isDarkTheme?"rgba(255,255,255,0.2)":"#cbd5e1")}}/>\n                    </div>\n                    <div style={{fontSize:11,fontWeight:active?700:500,color:active?s.accentColor:tc}}>{o.l}</div>\n                    <div style={{fontSize:9,color:sec,marginTop:2}}>{o.desc}</div>\n                  </button>;\n                })}\n              </div>\n              <div style={{fontSize:11,color:sec,marginBottom:10}}>Applies to buttons, links, active states, and highlights app-wide.</div>\n              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>\n                {ACCENT_COLORS.map(function(ac){var active=s.accentColor===ac.val;return <button key={ac.val} onClick={function(){upd("accentColor",ac.val);}} title={ac.name} style={{width:30,height:30,borderRadius:"50%",background:ac.val,border:active?"3px solid "+tc:"2px solid transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>{active&&<Check size={12} color="#fff"/>}</button>;})}\n                <input type="color" value={s.accentColor} onChange={function(e){upd("accentColor",e.target.value);}} style={{width:30,height:30,borderRadius:"50%",border:"2px solid "+brd,cursor:"pointer",padding:0,background:"transparent"}} title="Custom"/>\n              </div>\n            </div>}\n\n            {/* DISPLAY — Font, Density, Motion */}\n            {tab==="display"&&<div>\n              <Sec>Font Size</Sec>\n              <div style={{fontSize:11,color:sec,marginBottom:8}}>Changes text size across the entire app immediately.</div>\n              <SegBtn k="fontSize" val={s.fontSize} opts={[{v:"small",l:"Small (12px)"},{v:"medium",l:"Medium (14px)"},{v:"large",l:"Large (17px)"}]}/>\n              <div style={{display:"flex",gap:8,marginTop:10,marginBottom:4}}>\n                {[{v:"small",l:"Task title preview",sz:12},{v:"medium",l:"Task title preview",sz:14},{v:"large",l:"Task title preview",sz:17}].map(function(o){\n                  var active=s.fontSize===o.v;\n                  return <div key={o.v} style={{flex:1,background:active?s.accentColor+"15":cardBg,border:"1px solid "+(active?s.accentColor:brd),borderRadius:10,padding:"10px",textAlign:"center",transition:"all 0.2s"}}>\n                    <div style={{fontSize:o.sz,fontWeight:600,color:active?s.accentColor:tc,marginBottom:3}}>{o.l}</div>\n                    <div style={{fontSize:9,color:sec,textTransform:"capitalize"}}>{o.v}</div>\n                  </div>;\n                })}\n              </div>\n              <div style={{background:cardBg,borderRadius:10,padding:"10px 13px",fontSize:11,color:sec,marginBottom:4}}>\n                Currently active: <strong style={{color:s.accentColor}}>{s.fontSize} — {s.fontSize==="small"?"12px":s.fontSize==="large"?"17px":"14px"}</strong>. Applied app-wide.\n              </div>\n\n              <Sec>Layout Density</Sec>\n              <div style={{fontSize:11,color:sec,marginBottom:8}}>Controls spacing between elements. Compact fits more on screen.</div>\n              <SegBtn k="density" val={s.density} opts={[{v:"compact",l:"Compact"},{v:"comfortable",l:"Comfortable"},{v:"spacious",l:"Spacious"}]}/>\n              <div style={{display:"flex",gap:8,marginTop:10}}>\n                {[{v:"compact",lines:5,gap:2},{v:"comfortable",lines:3,gap:6},{v:"spacious",lines:2,gap:12}].map(function(o){\n                  var active=s.density===o.v;\n                  return <div key={o.v} style={{flex:1,background:active?s.accentColor+"15":cardBg,border:"1px solid "+(active?s.accentColor:brd),borderRadius:10,padding:"10px"}}>\n                    <div style={{display:"flex",flexDirection:"column",gap:o.gap}}>\n                      {Array.from({length:o.lines}).map(function(_,i){return <div key={i} style={{height:5,background:active?s.accentColor+"66":brd,borderRadius:2}}/>;})}\n                    </div>\n                    <div style={{fontSize:9,color:sec,marginTop:6,textTransform:"capitalize",textAlign:"center"}}>{o.v}</div>\n                  </div>;\n                })}\n              </div>\n\n              <Sec>Motion & Animations</Sec>\n              <Row label="Enable Animations" sub="Smooth transitions, hover effects, micro-interactions"><Toggle k="animations"/></Row>\n              <div style={{marginTop:8,background:s.animations?s.accentColor+"10":"rgba(0,0,0,0.05)",borderRadius:10,padding:"10px 13px",fontSize:11,color:s.animations?s.accentColor:sec,border:"1px solid "+(s.animations?s.accentColor+"30":brd)}}>\n                {s.animations ? "✅ Animations ON — cards slide in, tasks pop when completed" : "⏹ Animations OFF — instant transitions, better for motion sensitivity"}\n              </div>\n            </div>}\n\n            {/* CONFIGURATION — Turn features on / off */}\n            {tab==="configuration"&&<div>\n              <div style={{backg               <Sec>Data Storage</Sec>\n              <div style={{background:cardBg,border:"1px solid "+brd,borderRadius:12,padding:"14px",marginBottom:4,display:"flex",gap:12,alignItems:"flex-start"}}>\n                <span style={{fontSize:24}}>🔒</span>\n                <div><div style={{fontSize:13,fontWeight:800,color:tc,marginBottom:4}}>100% Local Storage</div><div style={{fontSize:11,color:sec,lineHeight:1.7}}>All data lives in your browser only. No server. No account. No tracking. No ads.</div></div>\n              </div>\n              <Sec>Export</Sec>\n              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:4}}>\n                <button onClick={props.onExportJSON} style={{background:s.accentColor+"12",border:"1px solid "+s.accentColor+"44",color:s.accentColor,borderRadius:12,padding:"12px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:16}}>📦</span><div><div>Export all data as JSON</div><div style={{fontSize:10,fontWeight:400,marginTop:1,opacity:0.75}}>Tasks, notes, projects — everything</div></div></button>\n                <button onClick={props.onExportCSV} style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.3)",color:"#10b981",borderRadius:12,padding:"12px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:16}}>📊</span><div><div>Export tasks as CSV</div><div style={{fontSize:10,fontWeight:400,marginTop:1,opacity:0.75}}>Open in Excel or Google Sheets</div></div></button>\n              </div>\n              <Sec>Danger Zone</Sec>\n              <div style={{display:"flex",flexDirection:"column",gap:7}}>\n                <button onClick={function(){if(window.confirm("Reset settings to defaults?"))props.onResetSettings();}} style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,6 ":"#f3f4f6")}}><span style={{fontSize:11,color:sec}}>{item.l}</span><span style={{fontSize:11,fontWeight:700,color:tc}}>{item.v}</span></div>;})} \n              <div style={{marginTop:14,background:cardBg,border:"1px solid "+brd,borderRadius:12,padding:"13px"}}>\n                <div style={{fontSize:11,fontWeight:800,color:tc,marginBottom:8}}>🗺️ Roadmap</div>\n                {[{v:"v1.1",d:"Calendar sync · iOS & Android"},{v:"v1.2",d:"Windows · Mac desktop (Tauri)"},{v:"v2.0",d:"AI planning · Invoicing · PDF import"}].map(function(r){return <div key={r.v} style={{display:"flex",gap:8,marginBottom:7,alignItems:"flex-start"}}>\n                  <div style={{background:s.accentColor+"22",color:s.accentColor,borderRadius:6,padding:"2px 7px",fontSize:9,fontWeight:800,flexShrink:0}}>{r.v}</div>\n                  <div style={{fontSize:11,color:sec}}>{r.d}</div>\n                </div>;})}\n              </div>\n            </div>}\n\n          </div>\n\n          {/* Footer — always visible at bottom */}\n          <div style={{flexShrink:0,borderTop:"1px solid "+brd,background:isDarkTheme?"rgba(0,0,0,0.6)":"rgba(255,255,255,0.97)",padding:"10px 18px",display:"flex",alignItems:"center",gap:8}}>\n            <span style={{fontSize:10,color:sec}}>✓ Changes save automatically</span>\n            <button onClick={props.onClose} style={{marginLeft:"auto",background:s.accentColor,color:"#fff",border:"none",borderRadius:8,padding:"7px 18px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Done</button>\n          </div>\n        </div>\n      </div>\n    </OASheet>\n  );\n}\n/* ── BOTTOM NAV ── */\nfunction ModeNav(props) {\n  var mode=props.mode;\n  var showLabels = props.showLabels !== false; // default true\n  var tabs=[\n    {key:"capture",icon:<PenLine size={18}/>,label:t("capture"),sub:t("notes")},\n    {key:"focus",icon:<Zap size={18}/>,label:t("focus"),sub:t("tasks")},\n    {key:"plan",icon:<LayoutGrid size={18}/>,label:t("plan"),sub:t("projects")},\n    {key:"cal",icon:<Calendar size={18}/>,label:t("calendar"),sub:t("calendar")},\n  ];\n  return (\n    <div className="oa-nav-glass" style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--oa-nav)",borderTop:"1px solid var(--oa-border)",display:"flex",zIndex:30,transition:"background 0.3s ease"}}>\n      {tabs.map(function(tab){\n        var active=mode===tab.key;\n        return (\n          <button key={tab.key} onClick={function(){props.onSwitch(tab.key);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:showLabels?"10px 0 14px":"12px 0",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",position:"relative",transition:"all 0.18s"}}>\n            {active&&<div style={{position:"absolute",top:0,left:"20%",right:"20%",height:2,background:"var(--oa-accent)",borderRadius:"0 0 3px 3px",boxShadow:"0 0 8px var(--oa-accent)"}}/>}\n            <span style={{color:active?"var(--oa-accent)":"var(--oa-tert)",display:"flex",marginBottom:showLabels?3:0,transition:"color 0.18s",filter:active?"drop-shadow(0 0 4px var(--oa-accent))":"none"}}>{tab.icon}</span>\n            {showLabels && <span style={{fontSize:10,fontWeight:active?700:400,color:active?"var(--oa-accent)":"var(--oa-tert)",letterSpacing:"0.04em",transition:"color 0.18s"}}>{active?tab.label:tab.sub}</span>}\n          </button>\n        );\n      })}\n    </div>\n  );\n}\n\n/* ── HOW TO GET THE APP MODAL ── */\nfunction HowToGetModal(props) {\n  var ua=window.navigator.userAgent;\n  var isAndroid=/android/i.test(ua);\n  var isIOS=/iphone|ipad|ipod/i.test(ua);\n  var isDesktop=!isAndroid&&!isIOS;\n  return (\n    <OAModal open={props.open} onClose={props.onClose} bg="var(--oa-card)" border="var(--oa-border)" w={440}>\n      <div style={{padding:24}}>\n        <div style={{fontSize:18,fontWeight:800,color:"var(--oa-text)",marginBottom:4}}>Get OmniAgent on your device</div>\n        <div style={{fontSize:13,color:"var(--oa-sec)",marginBottom:20}}>Install it like a real app — no App Store needed right now.</div>\n        {isAndroid&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12,padding:"14px 16px",marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color:"#15803d",marginBottom:8}}>📱 Android — Chrome</div><div style={{fontSize:13,color:"#166534",lineHeight:1.7}}>1. Tap the <strong>⋮ menu</strong> in Chrome<br/>2. Tap <strong>"Add to Home Screen"</strong><br/>3. Tap <strong>"Add"</strong> — done!</div></div>}\n        {isIOS&&<div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:12,padding:"14px 16px",marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color:"#0369a1",marginBottom:8}}>📱 iPhone / iPad — Safari</div><div style={{fontSize:13,color:"#075985",lineHeight:1.7}}>1. Tap the <strong>Share button</strong> (box with arrow up)<br/>2. Scroll down and tap <strong>"Add to Home Screen"</strong><br/>3. Tap <strong>"Add"</strong> — done!</div></div>}\n        {isDesktop&&<div>\n          <div style={{background:"#faf5ff",border:"1px solid #e9d5ff",borderRadius:12,padding:"14px 16px",marginBottom:10}}><div style={{fontSize:13,fontWeight:700,color:"#7e22ce",marginBottom:8}}>💻 Chrome / Edge on Desktop</div><div style={{fontSize:13,color:"#6b21a8",lineHeight:1.7}}>Look for the <strong>install icon</strong> in your browser address bar (right side). Click it → Click <strong>"Install"</strong>.</div></div>\n          <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:12,padding:"14px 16px",marginBottom:10}}><div style={{fontSize:13,fontWeight:700,color:"#c2410c",marginBottom:8}}>📱 On your phone</div><div style={{fontSize:13,color:"#9a3412",lineHeight:1.7}}>Open this same URL in Chrome (Android) or Safari (iPhone). Then follow the steps above for your device.</div></div>\n        </div>}\n        <div style={{background:"var(--oa-bg)",border:"1px solid var(--oa-border)",borderRadius:10,padding:"11px 14px",marginBottom:20}}>\n          <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4}}>COMING SOON</div>\n          <div style={{fontSize:12,color:"#64748b"}}>iOS App Store · Google Play · Windows · Mac</div>\n        </div>\n        <Btn onClick={props.onClose} style={{width:"100%",background:"var(--oa-accent)"}}>Got it</Btn>\n      </div>\n    </OAModal>\n  );\n}\n\n/* ── MAIN APP ── */\nfunction OmniAgent() {\n  var [userName, setUserName] = useState("");\n  var [notes,setNotes]=useState(SN);\n  var [tasks,setTasks]=useState(ST);\n  var [projects,setProjects]=useState(SP);\n  var milestones=SM;\n  var [mode,setMode]=useState("capture");\n  var [fading,setFading]=useState(false);\n  var [openNote,setOpenNote]=useState(null);\n  var [openTask,setOpenTask]=useState(null);\n  var [convertNote,setConvertNote]=useState(null);\n  var [showSearch,setShowSearch]=useState(false);\n  var [showQuickAdd,setShowQuickAdd]=useState(false);\n  var [showHowTo,setShowHowTo]=useState(false);\n  var [showImport,setShowImport]=useState(false);\n  var [showTemplate,setShowTemplate]=useState(false);\n  var [showSettings,setShowSettings]=useState(false);\n  var [settings,setSettings]=useState(function(){return loadSettings();});\n  var [toast,setToast]=useState(null);\n\n  // Apply theme + sync global settings ref whenever settings change\n  useEffect(function(){\n    _activeSettings.dateFormat = settings.dateFormat;\n    _activeSettings.timeFormat = settings.timeFormat;\n    _activeSettings.language   = settings.language;\n    // Update document language for accessibility + browser behavior\n    var localeMap2 = {en:"en",es:"es",fr:"fr",de:"de",pt:"pt",ja:"ja",zh:"zh"};\n    document.documentElement.lang = localeMap2[settings.language] || "en";\n    applyAppTheme(settings.appTheme, settings.accentColor);\n\n    // ── Border radius (shape customization) ──\n    var radiusMap    = {sharp:"4px",  default:"12px", rounded:"18px", pill:"28px"};\n    var radiusBtnMap = {sharp:"4px",  def

}}><Btn onClick={submit} style={{flex:1,background:T2.accent}}>{tab==="note"?"Save Note":tab==="task"?"Create Task":"Create Project"}</Btn><Btn variant="ghost" onClick={props.onClose}>Cancel</Btn></div>\n      </div>\n    </OAModal>\n  );\n}\n\n/* ── CSV IMPORT ── */\nfunction ImportModal(props) {\n  var [step, setStep] = useState("paste");\n  var [importType, setImportType] = useState("csv"); // csv | xml | text\n  var [raw, setRaw] = useState("");\n  var [rows, setRows] = useState([]);\n  var [headers, setHeaders] = useState([]);\n  var [mapping, setMapping] = useState({});\n  var [preview, setPreview] = useState([]);\n  var [importedCount, setImportedCount] = useState(0);\n\n  var ALIASES = {\n    title:   [\n      // Generic\n      "task name","name","title","subject","task","summary","work item",\n      // Jira\n      "issue","summary","issue summary","story","epic name","issue key",\n      // Asana\n      "task name","name",\n      // Trello\n      "card name","card title",\n      // MS Planner\n      "task title","bucket name",\n      // Monday\n      "item","item name",\n    ],\n    desc:    ["description","notes","details","body","comment","note","acceptance criteria","story description","card description"],\n    dueDate: [\n      // Generic\n      "finish","due date","end date","deadline","due","target date","end","finish date",\n      // MS Project specific\n      "finish date","baseline finish","actual finish","scheduled finish",\n      // Jira\n      "due date","duedate",\n      // Asana\n      "due date","due on",\n    ],\n    startDate:["start","start date","begin date","planned start","baseline start","scheduled start","actual start"],\n    priority:["priority","importance","urgency","rank","severity","story points","sp","points","issue priority"],\n    status:  [\n      "status","state","stage","complete","% complete","percent complete",\n      // Jira\n      "issue status","resolution","done","assignee status",\n      // MS Project\n      "% work complete","actual work",\n      // Asana\n      "completed","section",\n    ],\n    project: ["project","project name","epic","workstream","category","bucket","group","sprint","iteration","milestone","component","label"],\n  };\n\n  /* ── MS PROJECT XML PARSER ── */\n  function parseXML(text) {\n    try {\n      var parser = new DOMParser();\n      var doc = parser.parseFromString(text, "text/xml");\n      var tasks = [];\n      // MS Project XML format: <Tasks><Task>...</Task></Tasks>\n      var taskNodes = doc.querySelectorAll("Task");\n      if(!taskNodes.length) {\n        // Try generic XML: any element with Name or Title child\n        taskNodes = doc.querySelectorAll("task, Task, TASK, item, Item, row, Row");\n      }\n      taskNodes.forEach(function(node) {\n        function getVal(tag) {\n          var el = node.querySelector(tag);\n          return el ? el.textContent.trim() : "";\n        }\n        var name = getVal("Name") || getVal("Title") || getVal("Subject") || getVal("TaskName");\n        if(!name || name === "0") return; // MS Project has a row 0 which is the project summary\n        var outlineLevel = parseInt(getVal("OutlineLevel") || "1");\n        if(outlineLevel > 3) return; // skip deeply nested sub-tasks for now\n        var finish = getVal("Finish") || getVal("Deadline") || getVal("FinishDate") || getVal("DueDate");\n        var pct = getVal("PercentComplete") || getVal("PercentWorkComplete") || "0";\n        var priority = getVal("Priority") || "500"; // MS Project uses 0-1000 scale, 500=normal\n        var notes = getVal("Notes") || getVal("Description") || "";\n        // Normalize MS Project priority (0-1000) to our scale\n        var normP = "medium";\n        var p = parseInt(priority);\n        if(p >= 900) normP = "critical";\n        else if(p >= 700) normP = "high";\n        else if(p <= 200) normP = "low";\n        // Normalize status from percent complete\n        var normS = "inbox";\n        var pctNum = parseInt(pct);\n        if(pctNum >= 100) normS = "done";\n        else if(pctNum > 0) normS = "in_progress";\n        tasks.push({\n          title: name.slice(0, 120),\n          desc: notes.slice(0, 400),\n          dueDate: normDate(finish),\n          priority: normP,\n          status: normS,\n          project: getVal("WBS") || getVal("ProjectName") || "",\n        });\n      });\n      return tasks;\n    } catch(e) {\n      return [];\n    }\n  }\n\n  /* ── SMART TEXT / MARKDOWN PARSER ── */\n  function parseSmartText(text) {\n    var lines = text.split("\\n").filter(function(l) { return l.trim(); });\n    return lines.map(function(line) {\n      var title = line;\n      var dueDate = null;\n      var priority = "medium";\n      var status = "inbox";\n\n      // Strip markdown checkbox: - [ ] or - [x] or * [ ] or * [x]\n      var cbDone = /^[\\-\\*]\\s+\\[x\\]\\s+/i.test(title);\n      title = title.replace(/^[\\-\\*]\\s+\\[[ xX]\\]\\s+/, "");\n      if(cbDone) status = "done";\n\n      // Strip numbered list: 1. or 1)\n      title = title.replace(/^\\d+[\\.\\)]\\s+/, "");\n\n      // Strip plain bullet: - or * or •\n      title = title.replace(/^[\\-\\*•]\\s+/, "");\n\n      // Detect pipe-separated: Task | Due | Priority | Status\n      if(title.indexOf("|") >= 0) {\n        var parts = title.split("|").map(function(p) { return p.trim(); });\n        title = parts[0] || title;\n        if(parts[1]) dueDate = normDate(parts[1]);\n        if(parts[2]) priority = normPriority(parts[2]);\n        if(parts[3]) status = normStatus(parts[3]);\n      }\n\n      // Detect inline date: "Task name (due 2026-05-01)" or "Task name by Apr 20"\n      var dateMatch = title.match(/\\((?:due|by|on)?\\s*(\\d{4}-\\d{2}-\\d{2})\\)/i) ||\n                      title.match(/\\bby\\s+(\\w+ \\d+)\\b/i) ||\n                      title.match(/\\((\\d{1,2}\\/\\d{1,2}(?:\\/\\d{2,4})?)\\)/);\n      if(dateMatch && !dueDate) {\n        dueDate = normDate(dateMatch[1]);\n        title = title.replace(dateMatch[0], "").trim();\n      }\n\n      // Detect inline priority: "!!" or "!!!" or "[high]" or "#critical"\n      if(/!!!|#critical|\\[critical\\]/i.test(title)) { priority = "critical"; title = title.replace(/!!!|#critical|\\[critical\\]/gi,"").trim(); }\n      else if(/!!|#high|\\[high\\]/i.test(title)) { priority = "high"; title = title.replace(/!!|#high|\\[high\\]/gi,"").trim(); }\n      else if(/#low|\\[low\\]/i.test(title)) { priority = "low"; title = title.replace(/#low|\\[low\\]/gi,"").trim(); }\n\n      return { title: title.trim().slice(0, 120), desc: "", dueDate: dueDate, priority: priority, status: status, project: "" };\n    }).filter(function(r) { return r.title && r.title.length > 1; });\n  }\n\n  /* ── UNIFIED PARSE HANDLER ── */\n  function handleParse() {\n    if(!raw.trim()) return;\n    if(importType === "xml") {\n      var xmlTasks = parseXML(raw);\n      if(!xmlTasks.length) { alert("No tasks found in XML. Make sure you exported MS Project XML format (File → Save As → XML)."); return; }\n      setPreview(xmlTasks);\n      setStep("preview");\n      return;\n    }\n    if(importType === "text") {\n      var textTasks = parseSmartText(raw);\n      if(!textTasks.length) { return; }\n      setPreview(textTasks);\n      setStep("preview");\n      return;\n    }\n    // CSV\n    var parsed = parseCSV(raw);\n    if(!parsed.headers.length) return;\n    setHeaders(parsed.headers);\n    setRows(parsed.rows);\n    var mp = autoMap(parsed.headers);\n    setMapping(mp);\n    setPreview(buildPreview(parsed.rows, mp));\n    setStep(importType === "csv" ? "map" : "preview");\n  }\n\n  function detectDelim(text) {\n    var row0 = text.split("\\n")[0] || "";\n    var tabs = row0.split("\\t").length;\n    var commas = row0.split(",").length;\n    var semis = row0.split(";").length;\n    if(tabs > commas && tabs > semis) return "\\t";\n    if(semis > commas) return ";";\n    return ",";\n  }\n\n  function splitLine(line, delim) {\n    var result = []; var cur = ""; var inQ = false;\n    for(var i = 0; i < line.length; i++) {\n      var c = line[i];\n      if(c === \'"\') { inQ = !inQ; continue; }\n      if(c === delim && !inQ) { result.push(cur.trim()); cur = ""; continue; }\n      cur += c;\n    }\n    result.push(cur.trim());\n    return result;\n  }\n\n  function parseCSV(text) {\n    var delim = detectDelim(text);\n    var lines = text.trim().split("\\n").filter(function(l) { return l.trim(); });\n    if(lines.length < 2) return { headers: [], rows: [] };\n    var hdrs = splitLine(lines[0], delim).map(function(h) { return h.replace(/^"|"$/g, "").trim(); });\n    var rws = lines.slice(1).map(function(l) {\n      var vals = splitLine(l, delim);\n      var obj = {};\n      hdrs.forEach(function(h, i) { obj[h] = (vals[i] || "").replace(/^"|"$/g, "").trim(); });\n      return obj;\n    }).filter(function(r) {\n      var vals = Object.keys(r).map(function(k) { return r[k]; });\n      return vals.some(function(v) { return v; });\n    });\n    return { headers: hdrs, rows: rws };\n  }\n\n  function autoMap(hdrs) {\n    var m = {};\n    hdrs.forEach(function(h) {\n      var hl = h.toLowerCase().trim();\n      Object.keys(ALIASES).forEach(function(field) {\n        if(!m[field]) {\n          ALIASES[field].forEach(function(alias) {\n            if(!m[field] && (hl === alias || hl.indexOf(alias) === 0)) { m[field] = h; }\n          });\n        }\n      });\n    });\n    return m;\n  }\n\n  function normPriority(v) {\n    if(!v) return "medium";\n    var vl = v.toLowerCase();\n    if(vl.indexOf("crit") >= 0 || vl === "1" || vl === "urgent") return "critical";\n    if(vl.indexOf("high") >= 0 || vl === "2") return "high";\n    if(vl.indexOf("low") >= 0 || vl === "4" || vl === "5") return "low";\n    return "medium";\n  }\n\n  function normDate(v) {\n    if(!v) return null;\n    var clean = v.trim().split(" ")[0];\n    if(/^\\d{4}-\\d{2}-\\d{2}/.test(clean)) return clean.slice(0, 10);\n    var parts = clean.split(/[\\/\\-\\.]/);\n    if(parts.length === 3) {\n      if(parseInt(parts[0]) > 31) return parts[0] + "-" + parts[1].padStart(2,"0") + "-" + parts[2].padStart(2,"0");\n      var y = parts[2].length === 2 ? "20" + parts[2] : parts[2];\n      return y + "-" + parts[0].padStart(2,"0") + "-" + parts[1].padStart(2,"0");\n    }\n    return null;\n  }\n\n  function normStatus(v) {\n    if(!v) return "inbox";\n    var vl = v.toLowerCase();\n    if(vl.indexOf("done") >= 0 || vl.indexOf("complet") >= 0 || vl === "100%" || vl === "100") return "done";\n    if(vl.indexOf("progress") >= 0 || vl.indexOf("active") >= 0) return "in_progress";\n    if(vl.indexOf("next") >= 0 || vl.indexOf("ready") >= 0 || vl.indexOf("todo") >= 0) return "next";\n    return "inbox";\n  }\n\n  function buildPreview(rws, mp) {\n    return rws.slice(0, 200).map(function(row) {\n      return {\n        title:    mp.title    ? (row[mp.title] || "").slice(0, 120) : "",\n        desc:     mp.desc     ? (row[mp.desc] || "").slice(0, 400) : "",\n        dueDate:  mp.dueDate  ? normDate(row[mp.dueDate]) : null,\n        priority: mp.priority ? normPriority(row[mp.priority]) : "medium",\n        status:   mp.status   ? normStatus(row[mp.status]) : "inbox",\n        project:  mp.project  ? (row[mp.project] || "") : "",\n      };\n    }).filter(function(r) { return r.title && r.title.trim(); });\n  }\n\n  function reset() {\n    setStep("paste"); setRaw(""); setRows([]); setHeaders([]); setMapping({}); setPreview([]); setImportedCount(0); setImportType("csv");\n  }\n\n  function handleImport() {\n    var count = 0;\n    preview.forEach(function(item) {\n      if(!item.title.trim()) return;\n      props.onImportTask({ title: item.title, desc: item.desc, dueDate: item.dueDate, priority: item.priority, status: item.status, projectHint: item.project });\n      count++;\n    });\n    setImportedCount(count);\n    setStep("done");\n  }\n\n  var FIELDS = [\n    {k:"title",   l:"Task Title",  req:true},\n    {k:"desc",    l:"Description", req:false},\n    {k:"dueDate", l:"Due Date",    req:false},\n    {k:"priority",l:"Priority",    req:false},\n    {k:"status",  l:"Status",      req:false},\n    {k:"project", l:"Project Hint",req:false},\n  ];\n  var sel = {background:"rgba(0,0,0,0.04)",border:"1px solid #ddd6fe",borderRadius:8,padding:"6px 10px",color:"#1e1b4b",fontSize:12,outline:"none",width:"100%",fontFamily:"inherit"};\n  var rowCount = raw.trim() ? raw.trim().split("\\n").filter(function(l){return l.trim();}).length - 1 : 0;\n\n  return (\n    <OAModal open={props.open} onClose={function(){reset();props.onClose();}} bg="#f8f7ff" border="#ddd6fe" w={560}>\n      <div style={{padding:"16px 20px",borderBottom:"1px solid #ddd6fe",display:"flex",alignItems:"center",gap:10}}>\n        <span style={{fontSize:20}}>📥</span>\n        <div style={{flex:1}}>\n          <div style={{fontSize:15,fontWeight:800,color:"#1e1b4b"}}>Import Tasks</div>\n          <div style={{fontSize:11,color:"#6d60d8"}}>CSV · Excel · MS Project XML · Jira · Asana · Markdown text</div>\n        </div>\n        <button onClick={function(){reset();props.onClose();}} style={{background:"transparent",border:"none",cursor:"pointer",display:"flex"}}><X size={18} color="#6d60d8"/></button>\n      </div>\n\n      {step === "paste" && <div style={{padding:20}}>\n        {/* Import type tabs */}\n        <div style={{display:"flex",gap:6,marginBottom:16}}>\n          {[\n            {k:"csv",  l:"CSV / Excel",      emoji:"📊"},\n            {k:"xml",  l:"MS Project XML",   emoji:"📁"},\n            {k:"text", l:"Text / Markdown",  emoji:"📝"},\n          ].map(function(t){\n            var active = importType === t.k;\n            return <button key={t.k} onClick={function(){setImportType(t.k);setRaw("");}} style={{flex:1,background:active?"#6366f1":"rgba(99,102,241,0.07)",color:active?"#fff":"#6366f1",border:"1px solid "+(active?"#6366f1":"rgba(99,102,241,0.25)"),borderRadius:10,padding:"8px 4px",fontSize:11,fontWeight:active?700:500,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.15s"}}>\n              <span style={{fontSize:16}}>{t.emoji}</span>\n              <span>{t.l}</span>\n            </button>;\n          })}\n        </div>\n\n        {/* Instructions per type */}\n        {importType === "csv" && <div style={{background:"rgba(99,102,241,0.07)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:"11px 14px",marginBottom:14}}>\n          <div style={{fontSize:12,fontWeight:700,color:"#4f46e5",marginBottom:5}}>CSV / Excel / Google Sheets / Jira / Asana</div>\n          <div style={{fontSize:12,color:"#6366f1",lineHeight:1.8}}>In Excel: Select all cells → Copy → Paste below<br/>In Google Sheets: File → Download → CSV<br/>In Jira: Issues → Export → CSV</div>\n          <div style={{fontSize:11,color:"#818cf8",marginTop:5,fontWeight:600}}>Comma, tab, or semicolon separated — auto-detected</div>\n        </div>}\n\n        {importType === "xml" && <div style={{background:"rgba(99,102,241,0.07)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:"11px 14px",marginBottom:14}}>\n          <div style={{fontSize:12,fontWeight:700,color:"#4f46e5",marginBottom:5}}>MS Project XML Export</div>\n          <div style={{fontSize:12,color:"#6366f1",lineHeight:1.8}}>In MS Project: File → Save As → XML Format (.xml)<br/>Open the .xml file in Notepad → Select All → Copy → Paste below</div>\n          <div style={{fontSize:11,color:"#818cf8",marginTop:5,fontWeight:600}}>Preserves task names, dates, priorities, % complete</div>\n        </div>}\n\n        {importType === "text" && <div style={{background:"rgba(99,102,241,0.07)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:"11px 14px",marginBottom:14}}>\n          <div style={{fontSize:12,fontWeight:700,color:"#4f46e5",marginBottom:5}}>Smart Text — Paste any list format</div>\n          <div style={{fontSize:12,color:"#6366f1",lineHeight:1.8}}>Supports all of these formats:</div>\n          <div style={{fontSize:11,color:"#6366f1",fontFamily:"monospace",background:"rgba(99,102,241,0.08)",borderRadius:7,padding:"8px 10px",marginTop:6,lineHeight:2}}>\n            - [ ] Task name<br/>\n            - [x] Completed task<br/>\n            1. Numbered task<br/>\n            • Bullet task<br/>\n            Task | 2026-05-01 | High | In Progress<br/>\n            Task name (due 2026-04-20)<br/>\n            !! Urgent task (!! = high, !!! = critical)\n          </div>\n        </div>}\n\n        <div style={{fontSize:11,fontWeight:700,color:"#6d60d8",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>\n          {importType === "csv" ? "Paste CSV / spreadsheet data" : importType === "xml" ? "Paste MS Project XML content" : "Paste your task list"}\n        </div>\n        <textarea value={raw} onChange={function(e){setRaw(e.target.value);}}\n          placeholder={\n            importType === "csv" ? "Task Name,Due Date,Priority,Status\\nBuild homepage,2026-05-01,High,In Progress\\nWrite proposal,2026-04-20,Critical,Next" :\n            importType === "xml" ? "<?xml version=\\"1.0\\"?>\\n<Project>\\n  <Tasks>\\n    <Task><Name>Design homepage</Name><Finish>2026-05-01</Finish></Task>\\n  </Tasks>\\n</Project>" :\n            "- [ ] Design homepage\\n- [x] Write proposal\\n1. Call accountant\\n• Book flights\\nReview contract | 2026-04-25 | High\\n!! Fix critical bug"\n          }\n          rows={10} style={{width:"100%",background:"#fff",border:"1px solid #ddd6fe",borderRadius:10,padding:"12px",fontSize:12,fontFamily:"monospace",outline:"none",resize:"vertical",color:"#1e1b4b",lineHeight:1.6,boxSizing:"border-box"}}/>\n        <div style={{display:"flex",gap:8,marginTop:14}}>\n          <Btn onClick={handleParse} style={{flex:1,background:raw.trim()?"#6366f1":"#e2e8f0",color:raw.trim()?"#fff":"#94a3b8",cursor:raw.trim()?"pointer":"default"}}>\n            {raw.trim()\n              ? importType === "csv" ? "Parse — rsor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5,fontWeight:700}}>📋 Template</button>\n          <button onClick={function(){exportData(tasks,notes,projects);}} title="Export all data as JSON" style={{background:"transparent",border:"1px solid "+(isDark?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.1)"),color:T2.sec,borderRadius:100,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center"}}>💾</button>\n          <button onClick={function(){setShowSearch(true);}} style={{background:isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.04)",border:"none",color:T2.sec,borderRadius:9,padding:"7px 13px",fontSize:12,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:7}}>\n            <Search size={13}/><span>Search</span>\n          </button>\n        </div>\n      </div>\n\n      {/* Main content */}\n      <div style={{flex:1,overflowY:"auto",padding:"20px 18px",paddingBottom:96,opacity:fading?0:1,transform:fading?"translateY(6px)":"translateY(0)",transition:"opacity 0.16s ease, transform 0.16s ease"}}>\n        {renderView()}\n      </div>\n\n      {/* FAB */}\n      <button onClick={function(){setShowQuickAdd(true);}} style={{position:"fixed",bottom:72,right:18,width:48,height:48,borderRadius:"50%",background:T2.accent,border:"none",color:"#fff",cursor:"pointer",boxShadow:"0 6px 20px "+T2.accent+"55",display:"flex",alignItems:"center",justifyContent:"center",zIndex:29,transition:"background 0.3s ease"}}><Plus size={20}/></button>\n\n      <ModeNav mode={mode} onSwitch={switchMode}/>\n      <InstallBanner/>\n\n      <NoteSheet note={openNote} projects={projects} tasks={tasks} open={!!openNote} onClose={function(){setOpenNote(null);}} onSave={saveNote} onConvert={function(n){setOpenNote(null);setConvertNote(n);}} onArchive={archiveNote}/>\n      <TaskSheet task={openTask} projects={projects} notes={notes} mode={mode} open={!!openTask} onClose={function(){setOpenTask(null);}} onSave={sa

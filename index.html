window.__SRC__ = document.getElementById('__src__').textContent;

function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function(){
    document.getElementById('loading').innerHTML = '<div style="color:#ef4444;padding:30px;text-align:center;line-height:1.7">Could not load resources.<br>Please make sure you are connected to the internet<br>and reload this page.</div>';
  };
  document.head.appendChild(s);
}

    loadScript('https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js', function(){
      try {
        var compiled = Babel.transform(window.__SRC__, { presets: ['react'] }).code;
        var fn = new Function('React','ReactDOM','useState','useEffect','useRef', compiled);
        fn(React, ReactDOM, React.useState, React.useEffect, React.useRef);
        document.getElementById('loading').style.display = 'none';

        document.getElementById('loading').innerHTML = '<div style="color:#ef4444;padding:30px;text-align:center;font-family:monospace;font-size:12px;white-space:pre-wrap;max-width:90vw">' + e.message + '</div>';

});

function dayDiff(iso) { if(!iso) return null; return Math.floor((new Date(iso+"T12:00:00")-new Date(TODAY+"T12:00:00"))/86400000); }

/* ── BASE COMPONENTS ── */
function Chip(props) {
  var c = props.color;
  return <span style={Object.assign({display:"inline-flex",alignItems:"center",gap:3,background:c+"18",color:c,border:"1px solid "+c+"30",borderRadius:100,padding:"2px 9px",fontSize:11,fontWeight:600,letterSpacing:"0.02em",whiteSpace:"nowrap"},props.style||{})}>{props.children}</span>;
}
function PChip(props) { return <Chip color={PC[props.p]}>{PL[props.p]}</Chip>; }
function DueChip(props) {
  if(!props.d) return null;
  var n=dayDiff(props.d);
  if(n<0) return <Chip color="#ef4444"><AlertCircle size={9}/>{Math.abs(n)+"d late"}</Chip>;
  if(n===0) return <Chip color="#10b981"><Clock size={9}/>Today</Chip>;
  if(n<=3) return <Chip color="#f59e0b"><Clock size={9}/>{"In "+n+"d"}</Chip>;
  return <Chip color="#94a3b8">{fmtDate(props.d)}</Chip>;
}
function FL(props) { return <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6,color:props.color||"#78716c"}}>{props.children}</div>; }
function Divider() { return <div style={{height:1,background:"rgba(0,0,0,0.08)",margin:"14px 0"}}/>; }

function GlassInput(props) {
  var base={background:"rgba(0,0,0,0.04)",border:"1px solid "+props.border,borderRadius:10,padding:"10px 13px",color:props.color||"#1c1917",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5};
  if(props.multi) return <textarea value={props.value} onChange={function(e){props.onChange(e.target.value);}} placeholder={props.placeholder} rows={props.rows||3} style={Object.assign({},base,{resize:"vertical"})}/>;
  return <input value={props.value} onChange={function(e){props.onChange(e.target.value);}} placeholder={props.placeholder} style={base}/>;
}
function GlassSel(props) {
  return <select value={props.value} onChange={function(e){props.onChange(e.target.value);}} style={{background:"rgba(0,0,0,0.04)",border:"1px solid "+props.border,borderRadius:10,padding:"10px 13px",color:props.color||"#1c1917",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"}}>{props.opts.map(function(o){return <option key={o.v} value={o.v}>{o.l}</option>;})}</select>;
}
function Btn(props) {
  var variant=props.variant||"primary";
  var vS={primary:{background:props.color||"#1c1917",color:"#fff",border:"none"},ghost:{background:"transparent",color:"#78716c",border:"1px solid #ede9e0"},accent:{background:"linear-gradient(135deg,#818cf8,#4f46e5)",color:"#fff",border:"none"}};
  return <button onClick={props.onClick} style={Object.assign({borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"},vS[variant],props.style||{})}>{props.children}</button>;
}

/* ── OVERLAYS ── */
function OASheet(props) {
  return (
    <div>
      {props.open && <div onClick={props.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:50,backdropFilter:"blur(3px)"}}/>}
      <div style={{position:"fixed",top:0,right:0,bottom:0,width:props.w||500,background:props.bg||"#fff",borderLeft:"1px solid "+(props.border||"#ede9e0"),transform:props.open?"translateX(0)":"translateX(105%)",transition:"transform 0.25s ease",zIndex:51,overflowY:"auto",boxShadow:"-16px 0 40px rgba(0,0,0,0.15)"}}>
        {props.children}
      </div>
    </div>
  );
}
function OAModal(props) {
  if(!props.open) return null;
  return (
    <div onClick={props.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:60,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"10vh",backdropFilter:"blur(4px)"}}>
      <div className="pop-in" onClick={function(e){e.stopPropagation();}} style={{background:props.bg||"#fff",border:"1px solid "+(props.border||"#ede9e0"),borderRadius:16,width:props.w||500,overflow:"hidden",boxShadow:"0 24px 60px rgba(0,0,0,0.25)",maxHeight:"78vh",display:"flex",flexDirection:"column"}}>
        {props.children}
      </div>
    </div>
  );
}
function OAToast(props) {
  if(!props.msg) return null;
  return <div style={{position:"fixed",bottom:88,left:"50%",transform:"translateX(-50%)",background:"#1c1917",color:"#faf9f4",borderRadius:12,padding:"10px 20px",fontSize:13,fontWeight:500,zIndex:100,boxShadow:"0 8px 24px rgba(0,0,0,0.3)",display:"flex",alignItems:"center",gap:8,animation:"toastSlide 0.25s ease forwards",whiteSpace:"nowrap"}}><Check size={14} color="#4ade80"/>{props.msg}</div>;
}

/* ── NAME SETUP ── */
function NameSetup(props) {
  var [name, setName] = useState("");
  function save() {
    if(!name.trim()) return;
    props.onSave(name.trim());
  }
  return (
    <div style={{minHeight:"100vh",background:"#faf9f4",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
      <div style={{fontSize:32,fontWeight:900,letterSpacing:"-0.04em",color:"#1c1917",marginBottom:6}}>Omni<span style={{color:"#6366f1"}}>Agent</span></div>
      <div style={{fontSize:14,color:"#78716c",marginBottom:40,textAlign:"center"}}>Capture anything. Prioritize what matters. Plan when it counts.</div>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{fontSize:16,fontWeight:700,color:"#1c1917",marginBottom:14,textAlign:"center"}}>What should we call you?</div>
        <input
          value={name}
          onChange={function(e){setName(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter") save();}}
          placeholder="Your first name..."
          autoFocus
          style={{width:"100%",background:"#fff",border:"2px solid #ede9e0",borderRadius:12,padding:"14px 16px",fontSize:16,outline:"none",marginBottom:14,boxSizing:"border-box",fontFamily:"inherit",textAlign:"center"}}
        />
        <button onClick={save} disabled={!name.trim()} style={{width:"100%",background:name.trim()?"#6366f1":"#e2e8f0",color:name.trim()?"#fff":"#94a3b8",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:name.trim()?"pointer":"default",fontFamily:"inherit",transition:"all 0.15s"}}>
          Let's go →
        </button>
      </div>
    </div>
  );
}

/* ── TITLE PROMPT MODAL ── */
function TitlePrompt(props) {
  var [title, setTitle] = useState("");
  function save(useTitle) {
    props.onSave(useTitle || "Untitled");
  }
  return (
    <OAModal open={props.open} onClose={function(){save("Untitled");}} bg="#faf9f4" border="#ede9e0" w={400}>
      <div style={{padding:24}}>
        <div style={{fontSize:15,fontWeight:700,color:"#1c1917",marginBottom:6}}>Give this note a name?</div>
        <div style={{fontSize:13,color:"#78716c",marginBottom:16}}>You can leave it blank and save as Untitled.</div>
        <input
          value={title}
          onChange={function(e){setTitle(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter") save(title);}}
          placeholder="Note title..."
          autoFocus
          style={{width:"100%",background:"#fff",border:"1px solid #ede9e0",borderRadius:10,padding:"10px 13px",fontSize:14,outline:"none",marginBottom:14,boxSizing:"border-box",fontFamily:"inherit"}}
        />
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={function(){save(title);}} style={{flex:1}}>Save note</Btn>
          <Btn variant="ghost" onClick={function(){save("Untitled");}}>Save as Untitled</Btn>
        </div>
      </div>
    </OAModal>
  );
}

/* ── LIST SPLITTER MODAL ── */
function ListSplitter(props) {
  var lines = props.text ? props.text.split("\n").map(function(l){return l.trim();}).filter(Boolean) : [];
  var [items, setItems] = useState(lines.map(function(l,i){return {id:uid(),title:l,priority:"medium",dueDate:"",selected:true};}));
  var prioOpts = ["critical","high","medium","low"].map(function(v){return {v:v,l:PL[v]};});

  useEffect(function(){
    if(props.open) {
      var fresh = (props.text||"").split("\n").map(function(l){return l.trim();}).filter(Boolean);
      setItems(fresh.map(function(l){return {id:uid(),title:l,priority:"medium",dueDate:"",selected:true};}));
    }
  },[props.open]);

  function toggle(id) { setItems(function(its){return its.map(function(it){return it.id===id?Object.assign({},it,{selected:!it.selected}):it;});}); }
  function setPrio(id,p) { setItems(function(its){return its.map(function(it){return it.id===id?Object.assign({},it,{priority:p}):it;});}); }
  function setDue(id,d) { setItems(function(its){return its.map(function(it){return it.id===id?Object.assign({},it,{dueDate:d}):it;});}); }
  function bulkPrio(p) { setItems(function(its){return its.map(function(it){return Object.assign({},it,{priority:p});});}); }

  function createAll() {
    var selected = items.filter(function(it){return it.selected;});
    props.onCreateTasks(selected);
    props.onClose();
  }

  var selectedCount = items.filter(function(it){return it.selected;}).length;

  return (
    <OAModal open={props.open} onClose={props.onClose} bg="#faf9f4" border="#ede9e0" w={560}>
      <div style={{padding:"18px 20px",borderBottom:"1px solid #ede9e0"}}>
        <div style={{fontSize:16,fontWeight:800,color:"#1c1917",marginBottom:4}}>Split into tasks</div>
        <div style={{fontSize:13,color:"#78716c",marginBottom:12}}>{lines.length+" items detected · "+selectedCount+" selected"}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <div style={{fontSize:11,color:"#78716c",alignSelf:"center",marginRight:4}}>Set all:</div>
          {["critical","high","medium","low"].map(function(p){return <button key={p} onClick={function(){bulkPrio(p);}} style={{background:PC[p]+"18",color:PC[p],border:"1px solid "+PC[p]+"35",borderRadius:100,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{PL[p]}</button>;})}
        </div>
      </div>
      <div style={{overflowY:"auto",maxHeight:"52vh",padding:"10px 20px"}}>
        {items.map(function(item){
          return (
            <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #f5f5f5"}}>
              <div onClick={function(){toggle(item.id);}} style={{width:18,height:18,borderRadius:4,border:"2px solid "+(item.selected?"#6366f1":"#d1d5db"),background:item.selected?"#6366f1":"transparent",flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {item.selected && <Check size={11} color="#fff"/>}
              </div>
              <div style={{flex:1,fontSize:13,color:item.selected?"#1c1917":"#94a3b8",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
              <select value={item.priority} onChange={function(e){setPrio(item.id,e.target.value);}} disabled={!item.selected} style={{background:"transparent",border:"none",color:PC[item.priority],fontSize:11,fontWeight:600,cursor:"pointer",outline:"none",fontFamily:"inherit"}}>
                {prioOpts.map(function(o){return <option key={o.v} value={o.v}>{o.l}</option>;})}
              </select>
              <input type="date" value={item.dueDate} onChange={function(e){setDue(item.id,e.target.value);}} disabled={!item.selected} style={{background:"transparent",border:"1px solid #ede9e0",borderRadius:6,padding:"3px 7px",fontSize:11,color:"#78716c",outline:"none",cursor:"pointer",colorScheme:"light"}}/>
            </div>
          );
        })}
      </div>
      <div style={{padding:"14px 20px",borderTop:"1px solid #ede9e0",display:"flex",gap:8}}>
        <Btn onClick={createAll} style={{flex:1,background:"#6366f1"}}>{"Create "+selectedCount+" tasks"}</Btn>
        <Btn variant="ghost" onClick={props.onClose}>Cancel</Btn>
      </div>
    </OAModal>
  );
}

/* ── NOTE CARD ── */
function NoteCard(props) {
  var note=props.note;
  return (
    <div className="hov" onClick={function(){props.onOpen(note);}} style={{background:note.color||"#fff",border:"1px solid #ede9e0",borderRadius:14,padding:"14px 15px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",position:"relative",marginBottom:10}}>
      {note.pinned && <Star size={12} color="#f59e0b" style={{position:"absolute",top:12,right:12}} fill="#f59e0b"/>}

      <div style={{fontSize:13,fontWeight:700,color:"#1c1917",marginBottom:5,paddingRight:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{note.title||"Untitled"}</div>
      <div style={{fontSize:12,color:"#78716c",lineHeight:1.55,marginBottom:10,overflow:"hidden",maxHeight:36}}>{note.body}</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>

        {!note.convertedToTaskId && <button onClick={function(e){e.stopPropagation();props.onConvert(note);}} style={{background:"#fff7ed",border:"1px solid #fed7aa",color:"#c2410c",borderRadius:8,padding:"3px 9px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:3,fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}><ArrowRight size={10}/>Task</button>}

/* ── CAPTURE MODE ── */
function CaptureMode(props) {
  var [body, setBody] = useState("");
  var [showTitlePrompt, setShowTitlePrompt] = useState(false);
  var [pendingBody, setPendingBody] = useState("");
  var [showSplitter, setShowSplitter] = useState(false);
  var [splitterText, setSplitterText] = useState("");
  var notes=props.notes;
  var pinned=notes.filter(function(n){return n.pinned&&n.status==="active";});
  var rest=notes.filter(function(n){return !n.pinned&&n.status==="active";});
  var greeting = new Date().getHours()<12?"Good morning":"new Date().getHours()<17?'Good afternoon':'Good evening'";
  var hour = new Date().getHours();
  var greet = hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";

  function handleBodyChange(val) {
    setBody(val);
    // detect multi-line paste
    if(val.split("\n").filter(function(l){return l.trim();}).length >= 3) {
      setSplitterText(val);
      setShowSplitter(true);
      setBody("");
    }
  }

  function handleSave() {
    if(!body.trim()) return;
    setPendingBody(body.trim());
    setBody("");
    setShowTitlePrompt(true);
  }

  function handleTitleSave(title) {
    props.onAddNote(title, pendingBody, "#ffffff");
    setShowTitlePrompt(false);
    setPendingBody("");
  }

  function handleCreateTasks(taskItems) {
    taskItems.forEach(function(item){
      props.onAddTask({title:item.title,desc:"",priority:item.priority,dueDate:item.dueDate||null,projectId:null});
    });
    props.onToast("Created "+taskItems.length+" tasks");
  }

  return (
    <div className="fade-up" style={{paddingBottom:20}}>
      <div style={{marginBottom:22}}>
        <div style={{fontSize:11,fontWeight:600,color:"#78716c",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        <div style={{fontSize:26,fontWeight:800,color:"#1c1917",letterSpacing:"-0.03em"}}>{greet+", "}<span style={{color:"#c2410c"}}>{props.userName}</span> ✦</div>
        <div style={{fontSize:13,color:"#78716c",marginTop:3}}>{notes.filter(function(n){return n.status==="active";}).length+" notes · "+notes.filter(function(n){return n.convertedToTaskId;}).length+" converted"}</div>
      </div>

      <div style={{background:"#fff",border:"1px solid #ede9e0",borderRadius:16,padding:"14px 16px",marginBottom:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <textarea
          value={body}
          onChange={function(e){handleBodyChange(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter"&&e.metaKey) handleSave();}}
          placeholder={"What's on your mind, "+props.userName+"? Type or paste anything here..."}
          rows={3}
          style={{width:"100%",background:"transparent",border:"none",outline:"none",color:"#1c1917",fontSize:14,fontFamily:"inherit",resize:"none",lineHeight:1.6}}
        />
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
          <span style={{fontSize:11,color:"#c4b8ad"}}>{body.trim()?"⌘+Enter to save or tap Save →":""}</span>
          <div style={{display:"flex",gap:7}}>
            {body.trim() && <button onClick={handleSave} style={{background:"#1c1917",color:"#faf9f4",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Save note</button>}
          </div>
        </div>
      </div>

      <TitlePrompt open={showTitlePrompt} onSave={handleTitleSave}/>
      <ListSplitter open={showSplitter} text={splitterText} onClose={function(){setShowSplitter(false);}} onCreateTasks={handleCreateTasks}/>

      {pinned.length>0 && <div style={{marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:700,color:"#c4b8ad",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10,display:"flex",alignItems:"center",gap:5}}><Star size={10} fill="#c4b8ad" color="#c4b8ad"/>Pinned</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{pinned.map(function(n){return <NoteCard key={n.id} note={n} onOpen={props.onOpenNote} onConvert={props.onConvert}/>;})}</div>
      </div>}
      {rest.length>0 && <div>
        {pinned.length>0 && <div style={{fontSize:10,fontWeight:700,color:"#c4b8ad",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>Other notes</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{rest.map(function(n){return <NoteCard key={n.id} note={n} onOpen={props.onOpenNote} onConvert={props.onConvert}/>;})}</div>
      </div>}
      {notes.filter(function(n){return n.status==="active";}).length===0 && <div style={{textAlign:"center",padding:"60px 0",color:"#c4b8ad"}}><PenLine size={36} color="#c4b8ad" style={{marginBottom:14}}/><div style={{fontSize:16,fontWeight:700,color:"#78716c",marginBottom:6}}>Nothing yet</div><div style={{fontSize:13}}>Type anything above to start.</div></div>}
    </div>
  );
}

/* ── FOCUS RING ── */
function ProgressRing(props) {
  var r=26; var circ=2*Math.PI*r; var offset=circ-(props.pct/100)*circ;
  return <svg width={64} height={64} viewBox="0 0 64 64"><circle cx={32} cy={32} r={r} fill="none" stroke={props.track||"#e0e7ff"} strokeWidth={5}/><circle cx={32} cy={32} r={r} fill="none" stroke={props.color} strokeWidth={5} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform="rotate(-90 32 32)" style={{transition:"stroke-dashoffset 0.6s ease"}}/><text x={32} y={37} textAnchor="middle" fontSize={13} fontWeight={700} fill={props.color} fontFamily="inherit">{props.pct+"%"}</text></svg>;
}

/* ── TASK ROW ── */
function TaskRow(props) {
  var task=props.task; var done=task.status==="done"; var overdue=!done&&task.dueDate&&dayDiff(task.dueDate)<0;
  var T2=TH.focus;
  return (
    <div onClick={function(){props.onOpen(task);}} className="hov" style={{background:overdue?"rgba(239,68,68,0.05)":"#fff",border:"1px solid "+(overdue?"rgba(239,68,68,0.2)":T2.border),borderLeft:"3px solid "+(overdue?"#ef4444":PC[task.priority]),borderRadius:11,padding:"11px 14px",display:"flex",alignItems:"center",gap:12,marginBottom:7,opacity:done?0.5:1}}>
      <div onClick={function(e){e.stopPropagation();props.onComplete(task.id);}} style={{width:20,height:20,borderRadius:"50%",border:"2px solid "+(done?T2.accent:T2.tert),background:done?T2.accent:"transparent",flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
        {done && <Check size={11} color="#fff"/>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:500,color:done?T2.tert:T2.text,textDecoration:done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:5}}>{task.title}</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}><PChip p={task.priority}/><DueChip d={task.dueDate}/>{task.sourceNoteId&&<Chip color="#6366f1"><PenLine size={8}/>note</Chip>}</div>
      </div>
    </div>
  );
}

/* ── FOCUS MODE ── */
function FocusMode(props) {
  var T2=TH.focus; var tasks=props.tasks;
  var overdue=tasks.filter(function(t){return t.status!=="done"&&t.dueDate&&dayDiff(t.dueDate)<0;}).sort(function(a,b){return a.dueDate>b.dueDate?1:-1;});
  var critical=tasks.filter(function(t){return t.status!=="done"&&t.priority==="critical"&&!(t.dueDate&&dayDiff(t.dueDate)<0);});
  var inProg=tasks.filter(function(t){return t.status==="in_progress"&&t.priority!=="critical";});
  var dueToday=tasks.filter(function(t){return t.status!=="done"&&t.dueDate&&dayDiff(t.dueDate)===0&&t.priority!=="critical"&&t.status!=="in_progress";});
  var upcoming=tasks.filter(function(t){return t.status==="next"&&(!t.dueDate||dayDiff(t.dueDate)>0)&&t.priority!=="critical";}).slice(0,5);
  var total=overdue.length+critical.length+inProg.length+dueToday.length+upcoming.length;
  var doneCnt=tasks.filter(function(t){return t.status==="done";}).length;
  var pct=tasks.length?Math.round((doneCnt/tasks.length)*100):0;
  var dateStr=new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});

  function SecHead(p) { return <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,marginTop:p.mt?18:0}}><div style={{height:1,flex:1,background:T2.border}}/><span style={{fontSize:10,fontWeight:700,color:p.color||T2.tert,letterSpacing:"0.1em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{p.label}</span><div style={{height:1,flex:1,background:T2.border}}/></div>; }

  return (
    <div className="fade-up" style={{paddingBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:T2.sec,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>{dateStr}</div>
          <div style={{fontSize:26,fontWeight:800,color:T2.text,letterSpacing:"-0.03em"}}>{"Hi, "}<span style={{color:T2.accent}}>{props.userName}</span></div>
          <div style={{fontSize:13,color:T2.sec,marginTop:3}}>{doneCnt+" completed · "+overdue.length+" overdue"}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <ProgressRing pct={pct} color={T2.accent} track={T2.border}/>
          <span style={{fontSize:10,color:T2.tert,fontWeight:600}}>done</span>
        </div>
      </div>
      {total===0?<div style={{textAlign:"center",padding:"60px 0",color:T2.tert}}><CheckCircle2 size={40} color={T2.tert} style={{marginBottom:14}}/><div style={{fontSize:16,fontWeight:700,color:T2.sec,marginBottom:6}}>All clear</div><div style={{fontSize:13}}>Add tasks to start your day.</div></div>:(
        <div>
          {overdue.length>0&&<div><SecHead label="Overdue" color="#ef4444"/>{overdue.map(function(t){return <TaskRow key={t.id} task={t} onOpen={props.onOpenTask} onComplete={props.onComplete}/>;})}</div>}
          {critical.length>0&&<div><SecHead label="Critical" color={T2.accent} mt={true}/>{critical.map(function(t){return <TaskRow key={t.id} task={t} onOpen={props.onOpenTask} onComplete={props.onComplete}/>;})}</div>}
          {inProg.length>0&&<div><SecHead label="In Progress" color={T2.sec} mt={true}/>{inProg.map(function(t){return <TaskRow key={t.id} task={t} onOpen={props.onOpenTask} onComplete={props.onComplete}/>;})}</div>}
          {dueToday.length>0&&<div><SecHead label="Due Today" color="#10b981" mt={true}/>{dueToday.map(function(t){return <TaskRow key={t.id} task={t} onOpen={props.onOpenTask} onComplete={props.onComplete}/>;})}</div>}
          {upcoming.length>0&&<div><SecHead label="Up Next" mt={true}/>{upcoming.map(function(t){return <TaskRow key={t.id} task={t} onOpen={props.onOpenTask} onComplete={props.onComplete}/>;})}</div>}
        </div>
      )}
    </div>
  );
}

/* ── PROJECT VIEWS ── */

function ProjectTimeline(props) {
  var weeks=[]; for(var w=0;w<8;w++){var wd=new Date();wd.setDate(wd.getDate()+w*7);weeks.push(wd.toLocaleDateString("en-US",{month:"short",day:"numeric"}));}
  var startDate=new Date();
  function getPos(ds){if(!ds)return null;var days=Math.floor((new Date(ds+"T12:00:00")-startDate)/86400000);return Math.max(0,Math.min(97,(days/56)*100));}
  var rows=[]; props.tasks.forEach(function(t){if(t.dueDate||t.status==="in_progress")rows.push({type:"task",item:t});});
  props.milestones.forEach(function(m){rows.push({type:"mile",item:m});});
  if(rows.length===0) return <div style={{textAlign:"center",padding:"40px 0",color:TH.plan.tert,fontSize:13}}>Add due dates to tasks to see them here.</div>;
  return (
    <div style={{overflowX:"auto"}}><div style={{minWidth:560}}>
      <div style={{display:"grid",gridTemplateColumns:"150px 1fr",marginBottom:10}}>
        <div/>
        <div style={{display:"flex",borderBottom:"1px solid "+TH.plan.border,paddingBottom:8}}>{weeks.map(function(wk,i){return <div key={i} style={{flex:1,fontSize:9,color:TH.plan.tert,textAlign:"center",fontWeight:700}}>{wk}</div>;})}</div>
      </div>
      {rows.map(function(row,ri){
        if(row.type==="mile"){var pos=getPos(row.item.targetDate);if(pos===null)return null;return <div key={ri} style={{display:"grid",gridTemplateColumns:"150px 1fr",marginBottom:7,alignItems:"center"}}><div style={{fontSize:11,color:"#a78bfa",fontWeight:700,textAlign:"right",paddingRight:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{"🏁 "+row.item.title}</div><div style={{position:"relative",height:24}}><div style={{position:"absolute",left:"12.5%",top:0,bottom:0,width:1,background:"#a78bfa55"}}/><div style={{position:"absolute",left:pos+"%",top:"50%",transform:"translate(-50%,-50%)",width:12,height:12,background:"#a78bfa",borderRadius:3,rotate:"45deg"}}/></div></div>;}

/* ── INSTALL BANNER ── */
function InstallBanner(props) {
  var [show, setShow] = useState(false);
  var [isIOS, setIsIOS] = useState(false);
  var deferredRef = useRef(null);

  useEffect(function(){
    var ua = window.navigator.userAgent;
    var ios = /iphone|ipad|ipod/i.test(ua);
    setIsIOS(ios);
    if(!ios) {
      window.addEventListener("beforeinstallprompt", function(e) {
        e.preventDefault();
        deferredRef.current = e;
        setShow(true);
      });
    }
    // Show iOS instructions after 3 seconds if on iOS
    if(ios) {
      var t = setTimeout(function(){ setShow(true); }, 3000);
      return function(){ clearTimeout(t); };
    }
  },[]);

  function handleInstall() {
    if(deferredRef.current) {
      deferredRef.current.prompt();
      deferredRef.current.userChoice.then(function(){ setShow(false); });
    }
  }

  if(!show) return null;

  return (
    <div style={{position:"fixed",bottom:76,left:12,right:12,background:"#1e1b4b",border:"1px solid #4f46e5",borderRadius:14,padding:"12px 16px",zIndex:35,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#818cf8,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <span style={{color:"#fff",fontWeight:900,fontSize:16}}>O</span>

  var milestones=SM;
  var [mode,setMode]=useState("capture");
  var [fading,setFading]=useState(false);
  var [openNote,setOpenNote]=useState(null);
  var [openTask,setOpenTask]=useState(null);
  var [convertNote,setConvertNote]=useState(null);
  var [showSearch,setShowSearch]=useState(false);
  var [showQuickAdd,setShowQuickAdd]=useState(false);
  var [showHowTo,setShowHowTo]=useState(false);
  var [toast,setToast]=useState(null);
  var T2=TH[mode]||TH.capture;

  function showToast(msg){setToast(msg);setTimeout(function(){setToast(null);},2600);}

  function switchMode(m){if(m===mode)return;setFading(true);setTimeout(function(){setMode(m);setFading(false);},160);}

  useEffect(function(){
    function h(e){if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowSearch(true);}if(e.key==="Escape"){setShowSearch(false);setShowQuickAdd(false);}}
    window.addEventListener("keydown",h);
    return function(){window.removeEventListener("keydown",h);};
  },[]);

  function completeTask(id){setTasks(function(ts){return ts.map(function(t){return t.id===id?Object.assign({},t,{status:t.status==="done"?"inbox":"done"}):t;});});showToast("Task updated");}
  function saveTask(u){setTasks(function(ts){return ts.map(function(t){return t.id===u.id?u:t;});});showToast("Task saved");}
  function saveNote(u){setNotes(function(ns){return ns.map(function(n){return n.id===u.id?u:n;});});showToast("Note saved");}
  function archiveNote(id){setNotes(function(ns){return ns.map(function(n){return n.id===id?Object.assign({},n,{status:"archived"}):n;});});showToast("Archived");}
  function addNote(title,body,color){var n={id:uid(),title:title||"Untitled",body:body||"",tags:[],status:"active",pinned:false,color:color||"#ffffff",convertedToTaskId:null,linkedProjectId:null,createdAt:TODAY};setNotes(function(ns){return [n].concat(ns);});showToast("Note saved");}
  function addTask(data){var id=uid();var t={id:id,title:data.title||"Untitled",desc:data.desc||"",priority:data.priority||"medium",status:"inbox",dueDate:data.dueDate||null,projectId:data.projectId||null,sourceNoteId:data.sourceNoteId||null,createdAt:TODAY};setTasks(function(ts){return [t].concat(ts);});return id;}
  function addProject(title){var id=uid();var c=PROJECT_COLORS[projects.length%PROJECT_COLORS.length];var p={id:id,title:title,desc:"",status:"active",color:c,target:null};setProjects(function(ps){return ps.concat([p]);});showToast("Project created");}
  function handleConvert(data){var tid=addTask(data);setNotes(function(ns){return ns.map(function(n){return n.id===data.sourceNoteId?Object.assign({},n,{convertedToTaskId:tid}):n;});});showToast("Note converted to task");}
  function openProject(id){setMode("plan");}

  // Show name setup if no name yet
  if(!userName) {
    return (
      <div>
        <style>{GCSS}</style>
        <NameSetup onSave={setUserName}/>
      </div>
    );
  }

  function renderView(){
    if(mode==="capture") return <CaptureMode notes={notes} projects={projects} userName={userName} onOpenNote={setOpenNote} onConvert={setConvertNote} onAddNote={addNote} onAddTask={addTask} onToast={showToast}/>;
    if(mode==="focus") return <FocusMode tasks={tasks} projects={projects} userName={userName} onOpenTask={setOpenTask} onComplete={completeTask}/>;
    if(mode==="plan") return <PlanMode projects={projects} tasks={tasks} milestones={milestones} onOpenTask={setOpenTask} onComplete={completeTask} onAddProject={addProject}/>;
    if(mode==="cal") return <CalendarMode tasks={tasks} projects={projects} milestones={milestones} onOpenTask={setOpenTask}/>;
    return null;
  }

  var isDark=mode==="plan"||mode==="cal";

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif",background:T2.bg,minHeight:"100vh",display:"flex",flexDirection:"column",color:T2.text,transition:"background-color 0.3s ease"}}>
      <style>{GCSS}</style>

      {/* Top bar */}
      <div style={{padding:"11px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,borderBottom:"1px solid "+(isDark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)"),background:T2.card,transition:"background 0.3s ease"}}>
        <div style={{fontWeight:900,fontSize:17,letterSpacing:"-0.04em",color:T2.text}}>Omni<span style={{color:T2.accent}}>Agent</span></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={function(){setShowHowTo(true);}} style={{background:"transparent",border:"1px solid "+(isDark?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.1)"),color:T2.sec,borderRadius:100,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5,fontWeight:600}}><Download size={11}/>Get App</button>
          <button onClick={function(){setShowSearch(true);}} style={{background:isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.04)",border:"none",color:T2.sec,borderRadius:9,padding:"7px 13px",fontSize:12,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:7}}>
            <Search size={13}/><span>Search</span>
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,overflowY:"auto",padding:"20px 18px",paddingBottom:96,opacity:fading?0:1,transform:fading?"translateY(6px)":"translateY(0)",transition:"opacity 0.16s ease, transform 0.16s ease"}}>
        {renderView()}
      </div>

      {/* FAB */}
      <button onClick={function(){setShowQuickAdd(true);}} style={{position:"fixed",bottom:72,right:18,width:48,height:48,borderRadius:"50%",background:T2.accent,border:"none",color:"#fff",cursor:"pointer",boxShadow:"0 6px 20px "+T2.accent+"55",display:"flex",alignItems:"center",justifyContent:"center",zIndex:29,transition:"background 0.3s ease"}}><Plus size={20}/></button>

      <ModeNav mode={mode} onSwitch={switchMode}/>
      <InstallBanner/>

      <NoteSheet note={openNote} projects={projects} tasks={tasks} open={!!openNote} onClose={function(){setOpenNote(null);}} onSave={saveNote} onConvert={function(n){setOpenNote(null);setConvertNote(n);}} onArchive={archiveNote}/>
      <TaskSheet task={openTask} projects={projects} notes={notes} mode={mode} open={!!openTask} onClose={function(){setOpenTask(null);}} onSave={saveTask} onComplete={completeTask}/>
      <ConvertSheet note={convertNote} projects={projects} open={!!convertNote} onClose={function(){setConvertNote(null);}} onConfirm={handleConvert}/>
      <SearchModal open={showSearch} onClose={function(){setShowSearch(false);}} notes={notes} tasks={tasks} projects={projects} onOpenNote={function(n){setOpenNote(n);}} onOpenTask={function(t){setOpenTask(t);}} onOpenProject={openProject}/>
      <QuickAdd open={showQuickAdd} onClose={function(){setShowQuickAdd(false);}} mode={mode} projects={projects} onAddNote={addNote} onAddTask={function(d){addTask(d);showToast("Task created");}} onAddProject={addProject}/>
      <HowToGetModal open={showHowTo} onClose={function(){setShowHowTo(false);}}/>
      <OAToast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OmniAgent />);

</script>

</body>
</html>
